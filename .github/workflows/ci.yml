name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        env:
          HUSKY: "0"
      - run: pnpm --filter @ai-teacher/db exec prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm check:deps
      - run: pnpm test:unit
      - run: pnpm check:docs
      - run: pnpm --filter @ai-teacher/web build
