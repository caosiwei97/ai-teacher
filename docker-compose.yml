services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "25432:5432"
    environment:
      POSTGRES_DB: ai_teacher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "26379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "29000:9000"
      - "29001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Judge0 — 代码执行沙箱
  judge0-server:
    image: judge0/judge0:latest
    ports:
      - "2358:2358"
    environment:
      REDIS_HOST: redis-judge0
    depends_on:
      redis-judge0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2358/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-judge0:
    image: redis:7-alpine
    volumes:
      - ./data/redis-judge0:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
